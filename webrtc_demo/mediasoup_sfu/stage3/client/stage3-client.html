<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Stage 3 · mediasoup SFU 多人会议</title>
<script src="https://unpkg.com/mediasoup-client@3/dist/mediasoup.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg:      #080b10;
    --surface: #0e1318;
    --border:  #1a2130;
    --accent:  #00d4ff;
    --green:   #00ff88;
    --yellow:  #fbbf24;
    --red:     #f87171;
    --orange:  #fb923c;
    --purple:  #a78bfa;
    --text:    #cbd5e1;
    --dim:     #3d4f63;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
  }
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 800; color: #fff;
  }
  .hright {
    margin-left: auto; display: flex;
    align-items: center; gap: 16px; font-size: 11px;
  }
  .wdot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim); transition: background .3s;
  }
  .wdot.on  { background: var(--green); animation: pulse 2s infinite; }
  .wdot.err { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  /* ── Main Layout ── */
  main {
    display: grid;
    grid-template-columns: 1fr 380px;
    overflow: hidden;
  }

  /* ── 左侧：视频区域 + 控制 ── */
  .left {
    display: grid;
    grid-template-rows: 1fr auto;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* ── 视频网格 ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 2px;
    background: #000;
    overflow: hidden;
  }

  .video-grid.peers-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .video-grid.peers-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
  .video-grid.peers-3,
  .video-grid.peers-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .video-grid.peers-5,
  .video-grid.peers-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

  .vbox {
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
    min-height: 0;
  }

  .vbox video {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .vbox .vlabel {
    position: absolute; top: 8px; left: 8px;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    background: rgba(0,0,0,.8);
    border: 1px solid rgba(0,212,255,.3);
    padding: 2px 8px;
  }

  .vbox .vstate {
    position: absolute; bottom: 8px; left: 8px;
    font-size: 9px; color: var(--dim);
    background: rgba(0,0,0,.7); padding: 2px 6px;
  }

  .vbox .quality-badge {
    position: absolute; bottom: 8px; right: 8px;
    font-size: 9px; padding: 2px 6px;
    background: rgba(0,0,0,.7);
    border-left: 2px solid var(--dim);
    color: var(--dim); transition: all .3s;
  }
  .quality-badge.good   { border-color: var(--green);  color: var(--green);  }
  .quality-badge.medium { border-color: var(--yellow); color: var(--yellow); }
  .quality-badge.poor   { border-color: var(--red);    color: var(--red);    }

  /* ── 控制面板 ── */
  .ctrl {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .flow { display: flex; align-items: center; gap: 0; overflow-x: auto; }
  .fs {
    padding: 3px 10px; border: 1px solid var(--border);
    color: var(--dim); font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; white-space: nowrap; transition: all .2s;
  }
  .fa { color: var(--dim); padding: 0 3px; }
  .fs.active { border-color: var(--accent); color: var(--accent); }
  .fs.done   { border-color: var(--green);  color: var(--green);  }

  .row { display: flex; gap: 8px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .field label { font-size: 9px; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; }
  input[type=text] {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 7px 10px; outline: none; width: 100%;
    transition: border-color .2s;
  }
  input[type=text]:focus { border-color: var(--accent); }

  .brow { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 7px 14px;
    background: transparent; border: 1px solid var(--border);
    color: var(--dim); cursor: pointer; transition: all .15s;
  }
  button:not(:disabled):hover { color: var(--text); border-color: var(--text); }
  button.blue   { border-color: var(--accent); color: var(--accent); }
  button.green  { border-color: var(--green);  color: var(--green);  }
  button.red    { border-color: var(--red);    color: var(--red);    }
  button.yellow { border-color: var(--yellow); color: var(--yellow); }
  button.orange { border-color: var(--orange); color: var(--orange); }
  button:disabled { opacity: .2; cursor: not-allowed; }

  /* ── 右侧：参与者列表 + 日志 ── */
  .right {
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  /* 参与者列表 */
  .peers-panel {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    max-height: 200px;
    overflow-y: auto;
  }
  .peers-title {
    padding: 8px 14px;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--dim);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
  .peer-item {
    padding: 8px 14px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,.03);
    font-size: 11px;
    animation: fi .2s ease;
  }
  @keyframes fi { from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none} }
  .peer-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }
  .peer-dot.local { background: var(--accent); }
  .peer-name { flex: 1; }
  .peer-tracks { font-size: 9px; color: var(--dim); }

  /* 日志 */
  .logarea { display: flex; flex-direction: column; overflow: hidden; }
  .logtb {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .logtb span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
  .ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

  #logEl {
    flex: 1; overflow-y: auto; padding: 6px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .entry {
    display: grid; grid-template-columns: 60px 46px 1fr;
    gap: 6px; padding: 2px 4px;
    border-bottom: 1px solid rgba(255,255,255,.02);
    font-size: 10px; line-height: 1.6;
    animation: fi .15s ease;
  }
  .et { color: var(--dim); font-size: 9px; }
  .eg { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-align: right; }
  .em { word-break: break-all; }
  .cw { color: var(--accent); }  .cs { color: var(--orange); }
  .ci { color: var(--yellow); }  .cm { color: var(--green);  }
  .cr { color: var(--purple); }  .cp { color: #f0abfc;       }
  .ce { color: var(--red);    }

  /* Stats bar */
  .stats {
    border-top: 1px solid var(--border); padding: 6px 14px;
    display: flex; gap: 12px; font-size: 9px;
    background: var(--surface); flex-shrink: 0;
  }
  .sv { color: var(--green); font-weight: 700; }
</style>
</head>
<body>

<header>
  <div class="badge">Stage 3</div>
  <h1>mediasoup SFU · 多人会议</h1>
  <div class="hright">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="wdot" id="wsDot"></div>
      <span id="wsLabel">未连接</span>
    </div>
    <span id="roomLabel" style="color:var(--dim)">—</span>
  </div>
</header>

<main>
  <!-- 左侧 -->
  <div class="left">
    <!-- 视频网格 -->
    <div class="video-grid peers-1" id="videoGrid">
      <!-- 动态生成 video 元素 -->
    </div>

    <!-- 控制面板 -->
    <div class="ctrl">
      <!-- 流程步骤 -->
      <div class="flow">
        <div class="fs" id="f1">① 连接</div><div class="fa">→</div>
        <div class="fs" id="f2">② 加入</div><div class="fa">→</div>
        <div class="fs" id="f3">③ 能力协商</div><div class="fa">→</div>
        <div class="fs" id="f4">④ Transport</div><div class="fa">→</div>
        <div class="fs" id="f5">⑤ 发布流</div><div class="fa">→</div>
        <div class="fs" id="f6">⑥ 订阅流</div><div class="fa">→</div>
        <div class="fs" id="f7">⑦ 通话中</div>
      </div>

      <!-- 配置 -->
      <div class="row">
        <div class="field" style="flex:2">
          <label>信令服务器</label>
          <input type="text" id="serverUrl" />
        </div>
        <div class="field">
          <label>房间 ID</label>
          <input type="text" id="roomId" value="room-001" />
        </div>
        <div class="field">
          <label>我的名称</label>
          <input type="text" id="peerId" />
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="brow">
        <button class="blue"  id="btnJoin"    onclick="doJoin()">加入会议</button>
        <button class="orange" id="btnCam"   onclick="toggleCam()"  disabled>开启摄像头</button>
        <button class="orange" id="btnMic"   onclick="toggleMic()"  disabled>开启麦克风</button>
        <button class="yellow" id="btnMute"  onclick="toggleMute()" disabled>静音</button>
        <button class="red"    id="btnLeave" onclick="doLeave()"    disabled>离开</button>
      </div>

      <!-- Simulcast 控制 -->
      <div class="brow">
        <button id="btnLayerH" onclick="setLayer(2)" disabled>高清层</button>
        <button id="btnLayerM" onclick="setLayer(1)" disabled>中清层</button>
        <button id="btnLayerL" onclick="setLayer(0)" disabled>低清层</button>
        <button id="btnAuto"   onclick="setLayer(-1)" disabled>自动</button>
        <button onclick="showStats()" id="btnStats" disabled>Stats</button>
        <button onclick="clearLog()">清空</button>
      </div>
    </div>
  </div>

  <!-- 右侧 -->
  <div class="right">
    <!-- 参与者列表 -->
    <div class="peers-panel">
      <div class="peers-title">
        <span>参与者</span>
        <span id="peerCount">0人</span>
      </div>
      <div id="peerList"></div>
    </div>

    <!-- 日志 -->
    <div class="logarea">
      <div class="logtb">
        <div class="ldot"></div>
        <span>事件流</span>
      </div>
      <div id="logEl"></div>
      <div class="stats">
        <span>发: <span class="sv" id="sSend">—</span></span>
        <span>收: <span class="sv" id="sRecv">—</span></span>
        <span>RTT:<span class="sv" id="sRtt">—</span></span>
        <span>层: <span class="sv" id="sLayer">—</span></span>
      </div>
    </div>
  </div>
</main>

<script type="module">

import * as mediasoupClient from "mediasoup-client";

// ══════════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════════
document.getElementById('serverUrl').value = `wss://${location.hostname}:8444`;
document.getElementById('peerId').value    = 'user-' + Math.random().toString(36).slice(2,6);

// ══════════════════════════════════════════════════════
//  日志系统
// ══════════════════════════════════════════════════════
function log(tag, msg, cls='cw') {
  const el  = document.getElementById('logEl');
  const now = new Date();
  const t   = `${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).padStart(3,'0')}`;
  const row = document.createElement('div');
  row.className = 'entry';
  row.innerHTML = `<span class="et">${t}</span><span class="eg ${cls}">${tag}</span><span class="em">${msg}</span>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('logEl').innerHTML = ''; }

// ══════════════════════════════════════════════════════
//  步骤指示器
// ══════════════════════════════════════════════════════
function setFlow(n) {
  for (let i=1; i<=7; i++) {
    document.getElementById(`f${i}`).className =
      'fs'+(i<n?' done':i===n?' active':'');
  }
}

// ══════════════════════════════════════════════════════
//  核心状态
// ══════════════════════════════════════════════════════
let ws              = null;   // WebSocket
let device          = null;   // mediasoup Device
let sendTransport   = null;   // 发送 Transport
let recvTransport   = null;   // 接收 Transport
let camProducer     = null;   // 摄像头 Producer
let micProducer     = null;   // 麦克风 Producer

// 所有 Consumer：consumerId → consumer
const consumers     = new Map();
// 所有远端成员：peerId → { producers: [...] }
const remotePeers   = new Map();

// 本地媒体流
let camStream       = null;
let micStream       = null;

// 状态标志
let myPeerId        = '';
let myRoomId        = '';
let camOn           = false;
let micOn           = false;
let muted           = false;
let statsTimer      = null;

// 自动层切换
let autoLayer       = true;
let currentLayer    = 2;

// ══════════════════════════════════════════════════════
//  信令：发送和接收
// ══════════════════════════════════════════════════════
function wsSend(data) {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
    log('→', data.type, 'cs');
  }
}

// Request-Response 模式（带超时）
// function wsRequest(data, responseType, timeout=10000) {
//   return new Promise((resolve, reject) => {
//     const timer = setTimeout(() => {
//       reject(new Error(`${responseType} 超时`));
//     }, timeout);

//     const handler = (raw) => {
//       const msg = JSON.parse(raw.toString());
//       if (msg.type === responseType || msg.type === 'error') {
//         clearTimeout(timer);
//         ws.removeEventListener('message', handler);
//         if (msg.type === 'error') reject(new Error(msg.message));
//         else resolve(msg);
//       }
//     };

//     ws.addEventListener('message', handler);
//     wsSend(data);
//   });
// }

let requestCounter = 0;

//注意接口的理解，发送的数据和期望返回的类型
//这里实际上是协议层和msg.type进行类型对比  msg.type === expectedType
function wsRequest(data, expectedType, timeout = 15000) {  // 加长到 15s 防慢
  return new Promise((resolve, reject) => {
    const requestId = ++requestCounter;
    data.requestId = requestId;  // 加到请求里

    const timer = setTimeout(() => {
      reject(new Error(`${expectedType} 超时 (reqId=${requestId})`));
    }, timeout);

    const handler = (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch(e) { return; }

      if (msg.requestId === requestId) {
        clearTimeout(timer);
        ws.removeEventListener('message', handler);
        if (msg.type === 'error') {
          reject(new Error(msg.message || '服务器错误'));
        } else if (msg.type === expectedType) {
          resolve(msg);
        } else {
          console.warn(`意外响应类型: ${msg.type} (期待 ${expectedType})`);
        }
      }
    };

    ws.addEventListener('message', handler);
    wsSend(data);
    log('→', `${data.type} (reqId=${requestId})`, 'cs');
  });
}


// ══════════════════════════════════════════════════════
//  主流程：加入会议
// ══════════════════════════════════════════════════════
async function doJoin() {
  myPeerId = document.getElementById('peerId').value.trim();
  myRoomId = document.getElementById('roomId').value.trim();
  const url = document.getElementById('serverUrl').value.trim();

  document.getElementById('btnJoin').disabled = true;
  log('STEP', `连接信令服务器 ${url}`, 'cp');
  setFlow(1);

  // ── Step 1：连接 WebSocket ──
  ws = new WebSocket(url);

  ws.onopen = async () => {
    log('WS', '✓ WebSocket 连接成功', 'cw');
    document.getElementById('wsDot').className = 'wdot on';
    document.getElementById('wsLabel').textContent = '已连接';
    setFlow(2);

    try {
      await joinFlow();
    } catch(err) {
      log('ERR', err.message, 'ce');
    }
  };

  ws.onerror = () => {
    log('WS', '✗ 连接失败', 'ce');
    document.getElementById('wsDot').className = 'wdot err';
    document.getElementById('btnJoin').disabled = false;
  };

  ws.onclose = () => {
    log('WS', '连接断开', 'ce');
    document.getElementById('wsDot').className = 'wdot err';
  };

  // 处理服务端主动推送的事件
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    handleServerEvent(msg);
  };
}

async function joinFlow() {
  // ── Step 2：先获取 Router RTP 能力（不需要登录）──
  log('STEP', '获取 Router RTP 能力...', 'cp');
  setFlow(2);

  // 先用 roomId 查询 Router 能力（服务端按需创建房间）
  const capResp = await wsRequest({
    type:   'getRouterRtpCapabilities',
    roomId: myRoomId,
  }, 'routerRtpCapabilities');

  // 初始化 mediasoup Device
  device = new mediasoupClient.Device();
  await device.load({ routerRtpCapabilities: capResp.rtpCapabilities });
  log('MEDIA', '✓ Device 初始化完成', 'cm');
  log('MEDIA', `编解码: ${device.rtpCapabilities.codecs.map(c=>c.mimeType).join(' / ')}`, 'cm');
  setFlow(3);

  // ── Step 3：加入房间（带上 rtpCapabilities）──
  log('STEP', `加入房间 [${myRoomId}]`, 'cp');

  const joinResp = await wsRequest({
    type:            'join',
    roomId:          myRoomId,
    peerId:          myPeerId,
    rtpCapabilities: device.rtpCapabilities,  // ← 关键：带上能力
  }, 'joined');

  log('ROOM', `✓ 加入成功，已有 ${joinResp.existingPeers.length} 人`, 'cr');
  document.getElementById('roomLabel').textContent = myRoomId;

  // 记录已有成员
  joinResp.existingPeers.forEach(p => remotePeers.set(p.id, p));

  // 更新参与者列表
  addPeerToList(myPeerId, true);
  joinResp.existingPeers.forEach(p => addPeerToList(p.id, false));

  // ── Step 4：创建 Transport ──
  log('STEP', '创建 Transport...', 'cp');
  setFlow(4);

  await createSendTransport();
  await createRecvTransport();

  log('STEP', '✓ Transport 创建完成', 'cp');

  // ── Step 5：开启按钮 ──
  document.getElementById('btnCam').disabled   = false;
  document.getElementById('btnMic').disabled   = false;
  document.getElementById('btnLeave').disabled = false;
  document.getElementById('btnStats').disabled = false;

  setFlow(5);
  log('STEP', '✓ 可以开始发布媒体流了', 'cp');

  // ── Step 6：订阅已有成员的流 ──
  if (joinResp.existingPeers.length > 0) {
    log('STEP', `订阅 ${joinResp.existingPeers.length} 个已有成员的流...`, 'cp');
    setFlow(6);
    for (const peer of joinResp.existingPeers) {
      for (const producer of peer.producers) {
        await subscribeToProducer(peer.id, producer.id, producer.kind);
      }
    }
  }
}

// ══════════════════════════════════════════════════════
//  创建 Send Transport
// ══════════════════════════════════════════════════════
async function createSendTransport() {
  const resp = await wsRequest(
    { type: 'createTransport', direction: 'send' },
    'transportCreated'
  );

  // 用服务端返回的参数创建客户端 Transport
  sendTransport = device.createSendTransport(resp.transportOptions);
  log('TRANS', `sendTransport 创建 id=${sendTransport.id.slice(0,8)}`, 'ci');

  // ── 连接事件：DTLS 握手 ──
  sendTransport.on('connect', async ({ dtlsParameters }, callback, errback) => {
    log('TRANS', 'sendTransport connect（DTLS握手）', 'ci');
    try {
      await wsRequest({
        type:           'connectTransport',
        transportId:    sendTransport.id,
        dtlsParameters,
      }, 'transportConnected');
      callback();
    } catch(err) {
      errback(err);
    }
  });

  // ── Produce 事件：通知服务端开始接收 ──
  sendTransport.on('produce', async ({ kind, rtpParameters, appData }, callback, errback) => {
    log('TRANS', `sendTransport produce kind=${kind}`, 'ci');
    try {
      const resp = await wsRequest({
        type:          'produce',
        transportId:   sendTransport.id,
        kind,
        rtpParameters,
        appData,
      }, 'produced');
      callback({ id: resp.id });
    } catch(err) {
      errback(err);
    }
  });

  sendTransport.on('connectionstatechange', (state) => {
    log('TRANS', `sendTransport state → ${state}`, 'ci');
    if (state === 'connected') {
      log('STEP', '✓ 发送通道建立完成', 'cp');
    }
  });
}

// ══════════════════════════════════════════════════════
//  创建 Recv Transport
// ══════════════════════════════════════════════════════
async function createRecvTransport() {
  const resp = await wsRequest(
    { type: 'createTransport', direction: 'recv' },
    'transportCreated'
  );

  recvTransport = device.createRecvTransport(resp.transportOptions);
  log('TRANS', `recvTransport 创建 id=${recvTransport.id.slice(0,8)}`, 'ci');

  // ── 连接事件：DTLS 握手 ──
  recvTransport.on('connect', async ({ dtlsParameters }, callback, errback) => {
    log('TRANS', 'recvTransport connect（DTLS握手）', 'ci');
    try {
      await wsRequest({
        type:           'connectTransport',
        transportId:    recvTransport.id,
        dtlsParameters,
      }, 'transportConnected');
      callback();
    } catch(err) {
      errback(err);
    }
  });

  recvTransport.on('connectionstatechange', (state) => {
    log('TRANS', `recvTransport state → ${state}`, 'ci');
    if (state === 'connected') {
      log('STEP', '✓ 接收通道建立完成', 'cp');
      setFlow(7);
      if (!statsTimer) statsTimer = setInterval(collectStats, 3000);
      enableLayerButtons();
    }
  });
}

// ══════════════════════════════════════════════════════
//  发布媒体流
// ══════════════════════════════════════════════════════
async function toggleCam() {
  const btn = document.getElementById('btnCam');

  if (!camOn) {
    log('MEDIA', '获取摄像头...', 'cm');
    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { width:1280, height:720, frameRate:30 },
        audio: false,
      });

      // 更新本地视频预览
      updateLocalVideo();

      // ── 发布摄像头流（带 Simulcast）──
      camProducer = await sendTransport.produce({
        track: camStream.getVideoTracks()[0],
        // Simulcast 三层配置
        encodings: [
          { rid:'l', maxBitrate:100_000, scaleResolutionDownBy:4 },
          { rid:'m', maxBitrate:300_000, scaleResolutionDownBy:2 },
          { rid:'h', maxBitrate:900_000 },
        ],
        codecOptions: {
          videoGoogleStartBitrate: 1000,
        },
        appData: { type: 'camera' }
      });

      camOn = true;
      btn.textContent = '关闭摄像头';
      btn.className   = 'red';
      log('MEDIA', `✓ 摄像头 Producer 创建 id=${camProducer.id.slice(0,8)}`, 'cm');

      // 监控 Producer 质量分
      camProducer.on('score', (score) => {
        log('MEDIA', `Producer score=${JSON.stringify(score)}`, 'cm');
      });

      // 更新参与者列表
      updatePeerTracks(myPeerId, 'video', true);

    } catch(err) {
      log('ERR', `摄像头失败: ${err.message}`, 'ce');
    }

  } else {
    // 关闭摄像头
    camProducer?.close();
    camStream?.getTracks().forEach(t => t.stop());
    camProducer = null;
    camStream   = null;
    camOn       = false;
    btn.textContent = '开启摄像头';
    btn.className   = 'orange';
    updateLocalVideo();
    updatePeerTracks(myPeerId, 'video', false);
    log('MEDIA', '摄像头已关闭', 'cm');
  }
}

async function toggleMic() {
  const btn = document.getElementById('btnMic');

  if (!micOn) {
    log('MEDIA', '获取麦克风...', 'cm');
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl:  true,
        },
        video: false,
      });

      // 发布麦克风流
      micProducer = await sendTransport.produce({
        track:   micStream.getAudioTracks()[0],
        appData: { type: 'microphone' }
      });

      micOn = true;
      btn.textContent = '关闭麦克风';
      btn.className   = 'red';
      document.getElementById('btnMute').disabled = false;
      log('MEDIA', `✓ 麦克风 Producer 创建 id=${micProducer.id.slice(0,8)}`, 'cm');
      updatePeerTracks(myPeerId, 'audio', true);

    } catch(err) {
      log('ERR', `麦克风失败: ${err.message}`, 'ce');
    }

  } else {
    micProducer?.close();
    micStream?.getTracks().forEach(t => t.stop());
    micProducer = null;
    micStream   = null;
    micOn       = false;
    muted       = false;
    btn.textContent = '开启麦克风';
    btn.className   = 'orange';
    document.getElementById('btnMute').disabled  = true;
    document.getElementById('btnMute').textContent = '静音';
    updatePeerTracks(myPeerId, 'audio', false);
    log('MEDIA', '麦克风已关闭', 'cm');
  }
}

function toggleMute() {
  if (!micStream) return;
  muted = !muted;
  micStream.getAudioTracks().forEach(t => t.enabled = !muted);
  document.getElementById('btnMute').textContent = muted ? '取消静音' : '静音';
  log('MEDIA', `麦克风 → ${muted ? '静音' : '恢复'}`, 'cm');
}

// ══════════════════════════════════════════════════════
//  订阅远端流
// ══════════════════════════════════════════════════════
async function subscribeToProducer(producerPeerId, producerId, kind) {
  log('STEP', `订阅 peer=${producerPeerId} kind=${kind}`, 'cp');
  setFlow(6);

  const resp = await wsRequest({
    type:           'consume',
    producerPeerId,
    producerId,
  }, 'consumed');

  if (!resp || resp.type === 'consumeFailed') {
    log('ERR', `订阅失败 producerId=${producerId}`, 'ce');
    return;
  }

  // 用服务端返回的参数创建 Consumer
  const consumer = await recvTransport.consume({
    id:            resp.id,
    producerId:    resp.producerId,
    kind:          resp.kind,
    rtpParameters: resp.rtpParameters,
  });

  consumers.set(consumer.id, consumer);
  log('MEDIA', `✓ Consumer 创建 kind=${consumer.kind} id=${consumer.id.slice(0,8)}`, 'cm');

  // 渲染视频
  if (consumer.kind === 'video') {
    addRemoteVideo(producerPeerId, consumer.track);
  } else {
    addRemoteAudio(producerPeerId, consumer.track);
  }

  // ★ 通知服务端 resume（默认是 paused）
  await wsRequest(
    { type: 'resumeConsumer', consumerId: consumer.id },
    'consumerResumed'
  );

  log('MEDIA', `✓ Consumer resumed，开始接收 ${consumer.kind} 流`, 'cm');

  // 监听 Consumer 关闭
  consumer.on('transportclose', () => {
    log('MEDIA', `Consumer transportclose id=${consumer.id.slice(0,8)}`, 'cm');
    removeRemoteVideo(producerPeerId);
    consumers.delete(consumer.id);
  });
}

// ══════════════════════════════════════════════════════
//  服务端推送事件处理
// ══════════════════════════════════════════════════════
async function handleServerEvent(msg) {
  // wsRequest 的回调消息由它自己处理
  // 这里只处理服务端主动推送的事件
  switch(msg.type) {

    case 'peerJoined': {
      log('ROOM', `✓ 新成员加入: ${msg.peerId}`, 'cr');
      remotePeers.set(msg.peerId, { id: msg.peerId, producers: [] });
      addPeerToList(msg.peerId, false);
      break;
    }

    case 'peerLeft': {
      log('ROOM', `成员离开: ${msg.peerId}`, 'cr');
      remotePeers.delete(msg.peerId);
      removePeerFromList(msg.peerId);
      removeRemoteVideo(msg.peerId);
      break;
    }

    case 'newProducer': {
      // 有新的 Producer，立即订阅
      log('ROOM', `新 Producer: peer=${msg.peerId} kind=${msg.kind}`, 'cr');
      const peer = remotePeers.get(msg.peerId);
      if (peer) {
        peer.producers = peer.producers || [];
        peer.producers.push({ id: msg.producerId, kind: msg.kind });
        updatePeerTracks(msg.peerId, msg.kind, true);
      }
      // 自动订阅
      await subscribeToProducer(msg.peerId, msg.producerId, msg.kind);
      break;
    }

    case 'consumerClosed': {
      log('MEDIA', `Consumer 关闭 id=${msg.consumerId}`, 'cm');
      const consumer = consumers.get(msg.consumerId);
      if (consumer) {
        consumer.close();
        consumers.delete(msg.consumerId);
      }
      break;
    }

    case 'consumerLayersChanged': {
      const layers = msg.layers;
      if (layers) {
        log('MEDIA', `层切换 → spatial=${layers.spatialLayer} temporal=${layers.temporalLayer}`, 'cm');
        document.getElementById('sLayer').textContent =
          `${layers.spatialLayer}/${layers.temporalLayer}`;
      }
      break;
    }

    case 'producerScore':
    case 'consumerScore': {
      // 静默处理质量分数，用于自动层切换
      if (autoLayer && msg.type === 'consumerScore') {
        autoAdjustLayer(msg.consumerId, msg.score);
      }
      break;
    }
  }
}

// ══════════════════════════════════════════════════════
//  Simulcast 层切换
// ══════════════════════════════════════════════════════
function enableLayerButtons() {
  ['btnLayerH','btnLayerM','btnLayerL','btnAuto'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
}

async function setLayer(spatialLayer) {
  autoLayer = spatialLayer === -1;

  if (autoLayer) {
    log('STEP', '切换为自动层选择', 'cp');
    document.getElementById('btnAuto').className = 'green';
    return;
  }

  document.getElementById('btnAuto').className = '';
  currentLayer = spatialLayer;

  const layerNames = ['低清', '中清', '高清'];
  log('STEP', `手动切换层 → ${layerNames[spatialLayer]}`, 'cp');

  // 对所有视频 Consumer 设置偏好层
  for (const [consumerId, consumer] of consumers) {
    if (consumer.kind !== 'video') continue;
    await wsRequest({
      type:         'setPreferredLayers',
      consumerId,
      spatialLayer,
      temporalLayer: 2,
    }, 'preferredLayersSet');
  }
}

// 根据质量分自动调整层
async function autoAdjustLayer(consumerId, score) {
  if (!autoLayer) return;
  const s = Array.isArray(score) ? score[0]?.score : score?.score;
  if (s === undefined) return;

  let targetLayer;
  if      (s >= 8) targetLayer = 2;  // 高清
  else if (s >= 5) targetLayer = 1;  // 中清
  else             targetLayer = 0;  // 低清

  if (targetLayer !== currentLayer) {
    currentLayer = targetLayer;
    wsSend({
      type:         'setPreferredLayers',
      consumerId,
      spatialLayer:  targetLayer,
      temporalLayer: 2,
    });
  }
}

// ══════════════════════════════════════════════════════
//  视频 UI 管理
// ══════════════════════════════════════════════════════
function updateLocalVideo() {
  let vbox = document.getElementById('vbox-local');

  if (!vbox) {
    vbox = createVideoBox('local', `我 (${myPeerId})`);
    document.getElementById('videoGrid').appendChild(vbox);
  }

  const video = vbox.querySelector('video');
  if (camStream) {
    video.srcObject = new MediaStream(camStream.getVideoTracks());
  } else {
    video.srcObject = null;
  }

  updateGridLayout();
}

function addRemoteVideo(peerId, track) {
  let vbox = document.getElementById(`vbox-${peerId}`);

  if (!vbox) {
    vbox = createVideoBox(peerId, peerId);
    document.getElementById('videoGrid').appendChild(vbox);
    updateGridLayout();
  }

  const video = vbox.querySelector('video');
  // 可能已有音频流，追加视频 Track
  if (!video.srcObject) {
    video.srcObject = new MediaStream([track]);
  } else {
    video.srcObject.addTrack(track);
  }

  vbox.querySelector('.vstate').textContent = '接收中';
}

function addRemoteAudio(peerId, track) {
  // 音频：找到对应的 video 元素，把 audio track 加进去
  const vbox = document.getElementById(`vbox-${peerId}`);
  if (vbox) {
    const video = vbox.querySelector('video');
    if (!video.srcObject) {
      video.srcObject = new MediaStream([track]);
    } else {
      video.srcObject.addTrack(track);
    }
  } else {
    // 没有视频框时，创建一个纯音频框
    const audioEl = document.createElement('audio');
    audioEl.id       = `audio-${peerId}`;
    audioEl.autoplay = true;
    audioEl.srcObject = new MediaStream([track]);
    document.body.appendChild(audioEl);
  }
}

function removeRemoteVideo(peerId) {
  const vbox = document.getElementById(`vbox-${peerId}`);
  if (vbox) {
    vbox.remove();
    updateGridLayout();
  }
  const audio = document.getElementById(`audio-${peerId}`);
  if (audio) audio.remove();
}

function createVideoBox(peerId, label) {
  const vbox = document.createElement('div');
  vbox.className = 'vbox';
  vbox.id        = `vbox-${peerId}`;
  vbox.innerHTML = `
    <video autoplay ${peerId === 'local' ? 'muted' : ''} playsinline></video>
    <div class="vlabel">${label}</div>
    <div class="vstate">连接中...</div>
    <div class="quality-badge" id="quality-${peerId}">—</div>
  `;
  return vbox;
}

function updateGridLayout() {
  const grid  = document.getElementById('videoGrid');
  const count = grid.children.length;
  grid.className = `video-grid peers-${Math.min(count, 6)}`;
}

// ══════════════════════════════════════════════════════
//  参与者列表 UI
// ══════════════════════════════════════════════════════
function addPeerToList(peerId, isLocal) {
  const list = document.getElementById('peerList');
  const item = document.createElement('div');
  item.className = 'peer-item';
  item.id        = `peer-item-${peerId}`;
  item.innerHTML = `
    <div class="peer-dot ${isLocal ? 'local' : ''}"></div>
    <div class="peer-name">${peerId}${isLocal ? ' (我)' : ''}</div>
    <div class="peer-tracks" id="tracks-${peerId}">—</div>
  `;
  list.appendChild(item);
  updatePeerCount();
}

function removePeerFromList(peerId) {
  document.getElementById(`peer-item-${peerId}`)?.remove();
  updatePeerCount();
}

function updatePeerTracks(peerId, kind, active) {
  const el = document.getElementById(`tracks-${peerId}`);
  if (!el) return;
  const current = el.textContent === '—' ? [] : el.textContent.split(' ');
  if (active) {
    if (!current.includes(kind)) current.push(kind);
  } else {
    const idx = current.indexOf(kind);
    if (idx > -1) current.splice(idx, 1);
  }
  el.textContent = current.length > 0 ? current.join(' ') : '—';
}

function updatePeerCount() {
  const count = document.getElementById('peerList').children.length;
  document.getElementById('peerCount').textContent = `${count}人`;
}

// ══════════════════════════════════════════════════════
//  统计信息
// ══════════════════════════════════════════════════════
async function collectStats() {
  if (!sendTransport) return;

  // 发送统计
  if (camProducer) {
    const stats = await camProducer.getStats();
    stats.forEach(r => {
      if (r.type === 'outbound-rtp' && r.kind === 'video') {
        document.getElementById('sSend').textContent =
          Math.round(r.bytesSent * 8 / 1000) + 'kb';
      }
    });
  }

  // 接收统计（第一个视频 Consumer）
  for (const [, consumer] of consumers) {
    if (consumer.kind !== 'video') continue;
    const stats = await consumer.getStats();
    stats.forEach(r => {
      if (r.type === 'inbound-rtp') {
        document.getElementById('sRecv').textContent =
          Math.round(r.bytesReceived * 8 / 1000) + 'kb';
      }
      if (r.type === 'remote-inbound-rtp') {
        document.getElementById('sRtt').textContent =
          Math.round((r.roundTripTime || 0) * 1000) + 'ms';
      }
    });
    break;
  }
}

async function showStats() {
  log('WS', '── Stats ──', 'cw');
  for (const [id, consumer] of consumers) {
    const stats = await consumer.getStats();
    stats.forEach(r => {
      if (!['inbound-rtp','remote-inbound-rtp'].includes(r.type)) return;
      log('WS', `[${r.type}] kind=${r.kind} lost=${r.packetsLost} jitter=${Math.round((r.jitter||0)*1000)}ms`, 'cw');
    });
  }
}

// ══════════════════════════════════════════════════════
//  离开会议
// ══════════════════════════════════════════════════════
function doLeave() {
  if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }

  // 关闭所有媒体
  camProducer?.close();
  micProducer?.close();
  camStream?.getTracks().forEach(t => t.stop());
  micStream?.getTracks().forEach(t => t.stop());
  consumers.forEach(c => c.close());
  sendTransport?.close();
  recvTransport?.close();
  ws?.close();

  // 清空状态
  device=null; sendTransport=null; recvTransport=null;
  camProducer=null; micProducer=null;
  camStream=null; micStream=null;
  consumers.clear(); remotePeers.clear();
  camOn=false; micOn=false; muted=false;

  // 清空 UI
  document.getElementById('videoGrid').innerHTML = '';
  document.getElementById('peerList').innerHTML = '';
  updateGridLayout();
  document.getElementById('roomLabel').textContent = '—';
  document.getElementById('wsDot').className = 'wdot';
  document.getElementById('wsLabel').textContent = '未连接';

  // 重置按钮
  document.getElementById('btnJoin').disabled    = false;
  document.getElementById('btnCam').disabled     = true;
  document.getElementById('btnMic').disabled     = true;
  document.getElementById('btnMute').disabled    = true;
  document.getElementById('btnLeave').disabled   = true;
  document.getElementById('btnCam').textContent  = '开启摄像头';
  document.getElementById('btnCam').className    = 'orange';
  document.getElementById('btnMic').textContent  = '开启麦克风';
  document.getElementById('btnMic').className    = 'orange';
  ['btnLayerH','btnLayerM','btnLayerL','btnAuto','btnStats'].forEach(id =>
    document.getElementById(id).disabled = true
  );

  setFlow(1);
  log('STEP', '✓ 已离开会议', 'cp');
}

// ── 启动提示 ──
log('WS',   '═══ Stage 3 · mediasoup SFU 多人会议 ═══', 'cp');
log('ROOM', '点击「加入会议」开始', 'cr');
log('ROOM', '加入后可随时开启摄像头和麦克风', 'cr');
log('ROOM', '多人加入同一 roomId 即可互相通话', 'cw');
setFlow(1);

window.doJoin = doJoin;
window.toggleCam = toggleCam;
window.toggleMic = toggleMic;
window.toggleMute = toggleMute;
window.doLeave = doLeave;
window.setLayer = setLayer;
window.showStats = showStats;
window.clearLog = clearLog;

</script>
